<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Study Planner</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #f0f4ff 0%, #e0e7ff 100%);
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    .sidebar {
      width: 280px;
      background: white;
      border-right: 1px solid #e2e8f0;
      display: flex;
      flex-direction: column;
      box-shadow: 2px 0 10px rgba(0,0,0,0.05);
    }

    .logo {
      padding: 25px;
      border-bottom: 1px solid #e2e8f0;
    }

    .logo h1 {
      font-size: 28px;
      font-weight: 700;
      color: #4f46e5;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .nav {
      flex: 1;
      padding: 20px;
    }

    .nav a {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 18px;
      color: #64748b;
      text-decoration: none;
      border-radius: 12px;
      margin-bottom: 6px;
      font-weight: 500;
    }

    .nav a:hover, .nav a.active {
      background: #f0f0ff;
      color: #4f46e5;
    }

    .main-content {
      flex: 1;
      overflow-y: auto;
      padding: 30px;
    }

    .header h2 {
      font-size: 28px;
      color: #1e2937;
      margin-bottom: 30px;
    }

    .card {
      background: white;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
      padding: 24px;
      margin-bottom: 25px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #374151;
    }

    .form-group input {
      width: 100%;
      padding: 14px 18px;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      font-size: 16px;
    }

    .generate-btn {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 25px;
    }

    #results { display: none; }

    .results-top {
      display: grid;
      grid-template-columns: 7fr 5fr;
      gap: 28px;
      margin-bottom: 25px;
      align-items: stretch;
    }

    .schedule-container {
      max-height: 430px;
      overflow-y: auto;
      border-radius: 12px;
    }

    .schedule-table {
      width: 100%;
      border-collapse: collapse;
    }

    .schedule-table th, .schedule-table td {
      padding: 13px 16px;
      text-align: left;
      border-bottom: 1px solid #e2e8f0;
    }

    .schedule-table th {
      background: #f8fafc;
      font-weight: 600;
      position: sticky;
      top: 0;
    }

    .right-side {
      display: flex;
      flex-direction: column;
      gap: 22px;
      height: 100%;
    }

    .timer-card {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      text-align: center;
    }

    #timer {
      font-size: 54px;
      font-weight: 700;
      font-family: monospace;
      color: #1e2937;
      margin: 20px 0;
    }

    .timer-buttons {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-top: 10px;
    }

    .btn-start, .btn-reset {
      padding: 12px 32px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 16px;
    }
    .btn-start { background: #10b981; color: white; }
    .btn-reset { background: #e2e8f0; color: #334155; }

    .ai-suggestions {
      line-height: 1.85;
      color: #374151;
      max-height: 360px;
      overflow-y: auto;
      white-space: pre-wrap;
    }

    /* ===== Mobile (Hamburger sidebar) ===== */
    .mobile-topbar {
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
    }

    .hamburger-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border-radius: 12px;
      border: 1px solid #e2e8f0;
      background: rgba(255,255,255,0.85);
      color: #334155;
      cursor: pointer;
    }

    .hamburger-btn i { font-size: 18px; }

    .mobile-title {
      font-size: 18px;
      color: #1e2937;
      font-weight: 800;
    }

    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.35);
      z-index: 40;
    }

    @media (max-width: 1024px) {
      body {
        height: auto;
        overflow: auto;
        display: block;
      }

      .main-content {
        padding: 22px 18px 30px;
      }

      .card {
        padding: 20px;
        border-radius: 16px;
        margin-bottom: 18px;
      }

      .results-top {
        gap: 20px;
      }

      #timer {
        font-size: 48px;
        margin: 12px 0;
      }

      .schedule-container {
        max-height: 380px;
      }
    }

    @media (max-width: 768px) {
      body {
        height: auto;
        overflow: auto;
        display: block;
      }

      .mobile-topbar { display: flex; padding: 0 6px; }

      .sidebar {
        position: fixed;
        left: 0;
        top: 0;
        height: 100vh;
        width: 85vw;
        max-width: 320px;
        z-index: 50;
        transform: translateX(-100%);
        transition: transform 0.25s ease;
      }

      .sidebar.is-open {
        transform: translateX(0);
      }

      .sidebar-overlay.is-open {
        display: block;
      }

      .main-content {
        padding: 18px 14px 30px;
      }

      .header { display: none; }

      .results-top {
        grid-template-columns: 1fr;
        gap: 18px;
      }

      .card {
        padding: 16px;
        border-radius: 16px;
        margin-bottom: 18px;
      }

      #timer {
        font-size: 44px;
        margin: 10px 0;
      }

      .btn-start, .btn-reset {
        padding: 12px 18px;
        font-size: 15px;
      }

      .schedule-container {
        max-height: 320px;
        overflow-x: auto;
      }

      .schedule-table th, .schedule-table td {
        padding: 10px 10px;
        font-size: 13px;
        white-space: nowrap;
      }

      .timer-card { justify-content: flex-start; }
    }
  </style>
</head>

<body>

<div class="sidebar">
  <div class="logo">
    <h1><i class="fa-solid fa-graduation-cap"></i> StudyFlow</h1>
    <p style="color:#64748b;font-size:14px;">AI Study Planner</p>
  </div>
  <div class="nav">
    <a href="#" class="active"><i class="fa-solid fa-house"></i> Dashboard</a>
    <a href="#"><i class="fa-solid fa-calendar-days"></i> Schedule</a>
    <a href="#" onclick="resetTimer()"><i class="fa-solid fa-clock"></i> Focus Timer</a>
    <a href="#"><i class="fa-solid fa-chart-line"></i> Progress</a>
  </div>
</div>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<div class="main-content">
  <div class="mobile-topbar">
    <button class="hamburger-btn" onclick="toggleSidebar()" aria-label="Open menu">
      <i class="fa-solid fa-bars"></i>
    </button>
    <div class="mobile-title">AI Study Planner</div>
    <div style="width:44px"></div>
  </div>

  <div class="header"><h2>AI Study Planner</h2></div>

  <div class="card">
    <h3>Create Study Schedule</h3>
    <div class="form-grid">
      <div class="form-group">
        <label>Exam Date</label>
        <input type="date" id="exam_date">
      </div>
      <div class="form-group">
        <label>Subjects</label>
        <input type="text" id="subjects" placeholder="Math, Physics, Chemistry">
      </div>
      <div class="form-group">
        <label>Hours per Day</label>
        <input type="number" id="hours_per_day" value="6">
      </div>
    </div>
    <button class="generate-btn" onclick="generateSchedule()">Generate AI Schedule</button>
  </div>

  <div id="results">
    <div class="results-top">

      <!-- Schedule -->
      <div class="card">
        <h3>Your Study Schedule</h3>
        <div class="schedule-container">
          <div id="scheduleDisplay"></div>
        </div>
      </div>

      <!-- Right Side -->
      <div class="right-side">
        <div class="card timer-card">
          <h4>Focus Timer</h4>
          <div id="timer">25:00</div>
          <div class="timer-buttons">
            <button id="startBtn" onclick="toggleTimer()" class="btn-start">Start</button>
            <button onclick="resetTimer()" class="btn-reset">Reset</button>
          </div>
        </div>

        <div class="card">
          <h4>Study Progress</h4>
          <div style="width:100%; height:18px; background:#e2e8f0; border-radius:20px; overflow:hidden; margin:15px 0;">
            <div id="progressBar" style="width:0%; height:100%; background:linear-gradient(90deg, #4f46e5, #7c3aed); transition:width 0.5s ease;"></div>
          </div>
          <p id="progressText" style="text-align:center; font-weight:500;">0% Completed</p>
        </div>
      </div>
    </div>

    <!-- AI Suggestions -->
    <div class="card">
      <h4 style="margin-bottom:15px; color:#475569;">
        <i class="fa-solid fa-lightbulb" style="color:#eab308;"></i> AI Suggestions
      </h4>
      <div id="aiSuggestions" class="ai-suggestions"></div>
    </div>
  </div>
</div>

<script>
// ===== Mobile sidebar =====
function toggleSidebar() {
  const sidebar = document.querySelector('.sidebar');
  const overlay = document.getElementById('sidebarOverlay');
  sidebar.classList.toggle('is-open');
  overlay.classList.toggle('is-open');
}

function closeSidebar() {
  const sidebar = document.querySelector('.sidebar');
  const overlay = document.getElementById('sidebarOverlay');
  sidebar.classList.remove('is-open');
  overlay.classList.remove('is-open');
}

// Close sidebar after clicking any nav link (optional)
Array.from(document.querySelectorAll('.nav a')).forEach(a => {
  a.addEventListener('click', () => {
    closeSidebar();
  });
});

// Timer Logic
let timeLeft = 25 * 60;
let timerInterval = null;
let isRunning = false;

function updateTimer() {
  const min = Math.floor(timeLeft / 60);
  const sec = timeLeft % 60;
  document.getElementById('timer').textContent = `${min.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
}

function toggleTimer() {
  const btn = document.getElementById('startBtn');
  if (!isRunning) {
    isRunning = true;
    btn.textContent = "Pause";
    timerInterval = setInterval(() => {
      timeLeft--;
      updateTimer();
      if (timeLeft <= 0) {
        clearInterval(timerInterval);
        alert("🎉 Great job! Take a break.");
        resetTimer();
      }
    }, 1000);
  } else {
    clearInterval(timerInterval);
    isRunning = false;
    btn.textContent = "Resume";
  }
}

function resetTimer() {
  clearInterval(timerInterval);
  timeLeft = 25 * 60;
  isRunning = false;
  updateTimer();
  document.getElementById('startBtn').textContent = "Start";
}

// Generate Schedule with Checkboxes
async function generateSchedule() {
  const examDate = document.getElementById('exam_date').value;
  const subjectsInput = document.getElementById('subjects').value;
  const hours = parseInt(document.getElementById('hours_per_day').value);

  if (!examDate || !subjectsInput || !hours) {
    alert("Please fill all fields!");
    return;
  }

  const subjects = subjectsInput.split(',').map(s => s.trim()).filter(Boolean);

  try {
    const res = await fetch('/generate_schedule', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        exam_date: examDate,
        subjects: subjects,
        hours_per_day: hours
      })
    });

    const data = await res.json();

    if (data.error) return alert(data.error);

    let html = `<table class="schedule-table"><tr><th>Day</th><th>Done</th>`;
    subjects.forEach(sub => html += `<th>${sub}</th>`);
    html += `</tr>`;

    Object.keys(data.schedule).forEach(day => {
      html += `<tr>
        <td><strong>${day}</strong></td>
        <td><input type="checkbox" class="day-check" onchange="calculateProgress()"></td>`;
      subjects.forEach(sub => {
        const hrs = data.schedule[day][sub] || 0;
        html += `<td>${hrs.toFixed(1)} hrs</td>`;
      });
      html += `</tr>`;
    });
    html += `</table>`;

    document.getElementById('scheduleDisplay').innerHTML = html;
    document.getElementById('aiSuggestions').innerHTML = `<div>${data.suggestions}</div>`;

    document.getElementById('results').style.display = 'block';

  } catch (err) {
    alert("Error: " + err.message);
  }
}

function calculateProgress() {
  const checked = document.querySelectorAll('.day-check:checked').length;
  const total = document.querySelectorAll('.day-check').length;
  const percent = total ? Math.round((checked / total) * 100) : 0;

  document.getElementById('progressBar').style.width = percent + '%';
  document.getElementById('progressText').innerText = percent + '% Completed';
}

updateTimer();
</script>
</body>
</html>
